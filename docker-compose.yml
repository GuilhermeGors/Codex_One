# Codex One v2 — Docker Compose
# Orchestrates: FastAPI Backend + Langfuse Observability
#
# Hardware: Intel i5 12th Gen + GTX 3050 4GB VRAM
# Docker resource limits configured for benchmarking precision

services:
  # --- FastAPI Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LANGFUSE_HOST=http://langfuse:3000
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4"
    depends_on:
      - langfuse
    networks:
      - codex-network

  # --- Langfuse (LLMOps Observability) ---
  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=codex-one-langfuse-secret-change-me
      - NEXTAUTH_URL=http://localhost:3001
      - SALT=codex-one-salt-change-me
    depends_on:
      - langfuse-db
    networks:
      - codex-network

  langfuse-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse-pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - codex-network

volumes:
  langfuse-pgdata:

networks:
  codex-network:
    driver: bridge
